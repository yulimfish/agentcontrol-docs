<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B0E0E6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 外框 -->
  <rect x="20" y="20" width="160" height="160" rx="40" fill="url(#bgGrad)"/>

  <!-- 游戏窗口 -->
  <rect x="50" y="60" width="100" height="80" rx="10" fill="url(#skyGrad)"/>

  <!-- 像素风格草地方块 -->
  <g transform="translate(55, 105)">
    <!-- 泥土 -->
    <rect x="0" y="15" width="30" height="15" fill="#8B6914"/>
    <rect x="0" y="15" width="5" height="5" fill="#9B7924"/>
    <rect x="10" y="15" width="5" height="5" fill="#9B7924"/>
    <rect x="20" y="15" width="5" height="5" fill="#9B7924"/>
    <rect x="5" y="20" width="5" height="5" fill="#9B7924"/>
    <rect x="15" y="20" width="5" height="5" fill="#9B7924"/>
    <rect x="25" y="20" width="5" height="5" fill="#9B7924"/>
    <!-- 草方块顶部 -->
    <rect x="0" y="0" width="30" height="15" fill="#5D8C3A"/>
    <rect x="0" y="0" width="5" height="5" fill="#6D9C4A"/>
    <rect x="10" y="0" width="5" height="5" fill="#6D9C4A"/>
    <rect x="20" y="0" width="5" height="5" fill="#6D9C4A"/>
    <rect x="5" y="5" width="5" height="5" fill="#6D9C4A"/>
    <rect x="15" y="5" width="5" height="5" fill="#6D9C4A"/>
    <rect x="25" y="5" width="5" height="5" fill="#6D9C4A"/>
    <rect x="0" y="10" width="5" height="5" fill="#6D9C4A"/>
    <rect x="10" y="10" width="5" height="5" fill="#6D9C4A"/>
    <rect x="20" y="10" width="5" height="5" fill="#6D9C4A"/>
  </g>

  <!-- 另一个方块（石头） -->
  <g transform="translate(90, 95)">
    <rect x="0" y="0" width="30" height="30" fill="#808080"/>
    <rect x="0" y="0" width="5" height="5" fill="#909090"/>
    <rect x="10" y="0" width="5" height="5" fill="#909090"/>
    <rect x="20" y="0" width="5" height="5" fill="#909090"/>
    <rect x="5" y="5" width="5" height="5" fill="#909090"/>
    <rect x="15" y="5" width="5" height="5" fill="#909090"/>
    <rect x="25" y="5" width="5" height="5" fill="#909090"/>
    <rect x="0" y="10" width="5" height="5" fill="#909090"/>
    <rect x="10" y="10" width="5" height="5" fill="#909090"/>
    <rect x="20" y="10" width="5" height="5" fill="#909090"/>
    <rect x="5" y="15" width="5" height="5" fill="#909090"/>
    <rect x="15" y="15" width="5" height="5" fill="#909090"/>
    <rect x="25" y="15" width="5" height="5" fill="#909090"/>
    <rect x="0" y="20" width="5" height="5" fill="#909090"/>
    <rect x="10" y="20" width="5" height="5" fill="#909090"/>
    <rect x="20" y="20" width="5" height="5" fill="#909090"/>
    <rect x="5" y="25" width="5" height="5" fill="#909090"/>
    <rect x="15" y="25" width="5" height="5" fill="#909090"/>
    <rect x="25" y="25" width="5" height="5" fill="#909090"/>
  </g>

  <!-- 第三个方块（木头） -->
  <g transform="translate(125, 105)">
    <rect x="0" y="0" width="30" height="30" fill="#8B6914"/>
    <rect x="0" y="0" width="5" height="5" fill="#9B7924"/>
    <rect x="10" y="0" width="5" height="5" fill="#9B7924"/>
    <rect x="20" y="0" width="5" height="5" fill="#9B7924"/>
    <rect x="5" y="5" width="5" height="5" fill="#9B7924"/>
    <rect x="15" y="5" width="5" height="5" fill="#9B7924"/>
    <rect x="25" y="5" width="5" height="5" fill="#9B7924"/>
    <rect x="0" y="10" width="5" height="5" fill="#9B7924"/>
    <rect x="10" y="10" width="5" height="5" fill="#9B7924"/>
    <rect x="20" y="10" width="5" height="5" fill="#9B7924"/>
    <rect x="5" y="15" width="5" height="5" fill="#9B7924"/>
    <rect x="15" y="15" width="5" height="5" fill="#9B7924"/>
    <rect x="25" y="15" width="5" height="5" fill="#9B7924"/>
    <rect x="0" y="20" width="5" height="5" fill="#9B7924"/>
    <rect x="10" y="20" width="5" height="5" fill="#9B7924"/>
    <rect x="20" y="20" width="5" height="5" fill="#9B7924"/>
    <rect x="5" y="25" width="5" height="5" fill="#9B7924"/>
    <rect x="15" y="25" width="5" height="5" fill="#9B7924"/>
    <rect x="25" y="25" width="5" height="5" fill="#9B7924"/>
  </g>

  <!-- 十字准心 -->
  <g transform="translate(100, 100)">
    <rect x="-1" y="-10" width="2" height="7" fill="rgba(255,255,255,0.8)"/>
    <rect x="-1" y="3" width="2" height="7" fill="rgba(255,255,255,0.8)"/>
    <rect x="-10" y="-1" width="7" height="2" fill="rgba(255,255,255,0.8)"/>
    <rect x="3" y="-1" width="7" height="2" fill="rgba(255,255,255,0.8)"/>
    <rect x="-1" y="-1" width="2" height="2" fill="rgba(0,0,0,0.3)"/>
  </g>

  <!-- 快捷栏（Hotbar） -->
  <g transform="translate(55, 132)">
    <!-- 9个槽位 -->
    <rect x="0" y="0" width="10" height="10" fill="rgba(0,0,0,0.4)" rx="1"/>
    <rect x="11" y="0" width="10" height="10" fill="rgba(0,0,0,0.4)" rx="1"/>
    <rect x="22" y="0" width="10" height="10" fill="rgba(0,0,0,0.4)" rx="1"/>
    <rect x="33" y="0" width="10" height="10" fill="rgba(0,0,0,0.4)" rx="1"/>
    <rect x="44" y="0" width="10" height="10" fill="rgba(255,255,255,0.6)" rx="1"/> <!-- 选中 -->
    <rect x="55" y="0" width="10" height="10" fill="rgba(0,0,0,0.4)" rx="1"/>
    <rect x="66" y="0" width="10" height="10" fill="rgba(0,0,0,0.4)" rx="1"/>
    <rect x="77" y="0" width="10" height="10" fill="rgba(0,0,0,0.4)" rx="1"/>
    <rect x="88" y="0" width="10" height="10" fill="rgba(0,0,0,0.4)" rx="1"/>
  </g>

  <!-- 像素风格的云 -->
  <g transform="translate(60, 65)">
    <rect x="0" y="0" width="10" height="5" fill="rgba(255,255,255,0.7)" rx="1"/>
    <rect x="10" y="0" width="10" height="5" fill="rgba(255,255,255,0.7)" rx="1"/>
    <rect x="5" y="-5" width="10" height="5" fill="rgba(255,255,255,0.7)" rx="1"/>
  </g>

  <g transform="translate(120, 68)">
    <rect x="0" y="0" width="8" height="4" fill="rgba(255,255,255,0.6)" rx="1"/>
    <rect x="8" y="0" width="8" height="4" fill="rgba(255,255,255,0.6)" rx="1"/>
    <rect x="4" y="-4" width="8" height="4" fill="rgba(255,255,255,0.6)" rx="1"/>
  </g>

  <!-- 底部像素装饰 -->
  <rect x="50" y="145" width="100" height="3" fill="rgba(0,0,0,0.3)" rx="1"/>
</svg>